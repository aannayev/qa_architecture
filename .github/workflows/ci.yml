name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  quality-python:
    name: Quality Python (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [history, physics, ai-assistant]

    defaults:
      run:
        working-directory: services/${{ matrix.service }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" || pip install -e .

      - name: Lint
        run: |
          if [ -d app ]; then python -m ruff check app tests || true; fi

      - name: Tests with coverage gate
        run: |
          if [ "${{ matrix.service }}" = "ai-assistant" ]; then
            python -m pytest
          else
            python -m pytest --cov=app --cov-report=term-missing --cov-fail-under=80
          fi

  quality-go:
    name: Quality Go (math)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/math
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Go test
        run: go test ./...

  quality-java:
    name: Quality Java (geography)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/geography
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Maven test
        run: mvn -B test

  quality-frontend:
    name: Quality Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package.json
      - name: Install deps
        run: npm install
      - name: Build
        run: npm run build

  docker-build:
    name: Docker Build (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [history, physics, math, geography, ai-assistant, frontend]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t qa-architect/${{ matrix.service }}:ci ./services/${{ matrix.service }}

  compose-validate:
    name: Compose Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate base compose
        run: docker compose config --services

      - name: Validate compose with service profile
        run: docker compose --profile services config --services

  dependency-scan:
    name: Dependency Scan (Trivy FS)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Trivy scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: "1"

  secrets-scan:
    name: Secrets Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
