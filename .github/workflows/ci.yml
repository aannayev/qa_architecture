name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  quality-python:
    name: Quality Python (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [history, physics, ai-assistant]

    defaults:
      run:
        working-directory: services/${{ matrix.service }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" || pip install -e .

      - name: Lint
        run: |
          if [ -d app ]; then python -m ruff check app tests || true; fi

      - name: Tests with coverage gate
        run: |
          if [ "${{ matrix.service }}" = "ai-assistant" ]; then
            python -m pytest
          else
            python -m pytest --cov=app --cov-report=term-missing --cov-fail-under=80
          fi

  quality-go:
    name: Quality Go (math)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/math
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Go test
        run: go test ./...

  quality-java:
    name: Quality Java (geography)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/geography
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Maven test
        run: mvn -B test

  quality-frontend:
    name: Quality Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package.json
      - name: Install deps
        run: npm install
      - name: Build
        run: npm run build

  e2e-frontend:
    name: E2E Frontend (Playwright)
    runs-on: ubuntu-latest
    needs:
      - quality-python
      - quality-go
      - quality-java
      - quality-frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Install frontend deps
        run: npm install
        working-directory: frontend

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Start stack
        run: docker compose --profile services up -d --build

      - name: Wait for healthy services
        run: bash ./infrastructure/scripts/wait-for-healthy.sh

      - name: Run smoke checks
        run: bash ./infrastructure/scripts/smoke.sh

      - name: Run frontend e2e
        run: npm run test:e2e
        working-directory: frontend

      - name: Dump compose logs on failure
        if: failure()
        run: docker compose logs --tail=200

      - name: Shutdown stack
        if: always()
        run: docker compose --profile services down -v --remove-orphans

  docker-build:
    name: Docker Build (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: history
            context: ./services/history
          - service: physics
            context: ./services/physics
          - service: math
            context: ./services/math
          - service: geography
            context: ./services/geography
          - service: ai-assistant
            context: ./services/ai-assistant
          - service: frontend
            context: ./frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t qa-architect/${{ matrix.service }}:ci ${{ matrix.context }}

  compose-validate:
    name: Compose Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate base compose
        run: docker compose config --services

      - name: Validate compose with service profile
        run: docker compose --profile services config --services

  dependency-scan:
    name: Dependency Scan (Trivy FS)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Trivy scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: "1"

  secrets-scan:
    name: Secrets Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
