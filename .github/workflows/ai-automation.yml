name: AI Automation

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  ai-doc-and-test-advisor:
    name: AI Doc/Test Advisor
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Collect PR diff context
        id: diff
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.event.pull_request.head.sha }}"
          else
            base_sha="$(git rev-parse HEAD~1)"
            head_sha="$(git rev-parse HEAD)"
          fi

          echo "base_sha=${base_sha}" >> "$GITHUB_OUTPUT"
          echo "head_sha=${head_sha}" >> "$GITHUB_OUTPUT"

          {
            echo "## Changed files"
            git diff --name-only "${base_sha}" "${head_sha}" | sed 's/^/- /'
            echo
            echo "## Diff (truncated)"
            git diff --unified=2 "${base_sha}" "${head_sha}" | head -n 1200
          } > pr_context.txt

      - name: Install OpenAI SDK
        run: python -m pip install --upgrade openai

      - name: Generate AI advisory report
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        shell: bash
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          context = Path("pr_context.txt").read_text(encoding="utf-8")
          out = Path("ai_advisory.md")

          if not os.getenv("OPENAI_API_KEY"):
              out.write_text(
                  "# AI advisory report\n\n"
                  "AI provider key is not configured (`OPENAI_API_KEY`).\n\n"
                  "Fallback checks:\n"
                  "- Ensure docs are updated when API/contracts change.\n"
                  "- Ensure tests are added/updated for changed logic.\n"
                  "- Ensure security-sensitive changes include threat notes.\n",
                  encoding="utf-8",
              )
              raise SystemExit(0)

          from openai import OpenAI

          client = OpenAI(api_key=os.environ["OPENAI_API_KEY"])
          prompt = (
              "You are a senior QA architect assistant. "
              "Analyze this PR context and produce concise recommendations in Markdown with sections: "
              "1) Documentation updates needed, 2) Test additions needed, 3) Code quality risks, "
              "4) Security concerns, 5) Suggested follow-up checklist.\n\n"
              f"{context}"
          )

          resp = client.chat.completions.create(
              model="gpt-4o-mini",
              temperature=0.1,
              messages=[
                  {"role": "system", "content": "Be strict, concrete, and actionable."},
                  {"role": "user", "content": prompt},
              ],
          )
          content = resp.choices[0].message.content or "No advisory content generated."
          out.write_text("# AI advisory report\n\n" + content + "\n", encoding="utf-8")
          PY

      - name: Post advisory to PR
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('ai_advisory.md', 'utf8');
            const marker = '<!-- ai-automation-advisory -->';
            const finalBody = `${marker}\n${body}`;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const comments = await github.rest.issues.listComments({
              owner, repo, issue_number, per_page: 100
            });

            const existing = comments.data.find(
              c => c.user?.type === 'Bot' && c.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id, body: finalBody
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number, body: finalBody
              });
            }

      - name: Upload advisory artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-advisory-report
          path: ai_advisory.md
